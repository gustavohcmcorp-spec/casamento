.login[hidden]{display:none}.login .modal{max-width:420px;text-align:center}.login .who{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}.login .who .btn{min-height:48px}.login .who .btn.sel{outline:3px solid var(--gold-l);background:var(--sage-d);color:#fff}

(function(){
  var d=defaultDB(), s=load(), migrated=migrateDB(s||d);
  DB=migrated.data;
  for(var k in d){ if(!(k in DB)) DB[k]=d[k]; }
  DB.pagamentos=(DB.pagamentos||[]).map(ensurePayment);
  DB.convidados=(DB.convidados||[]).map(function(g){return Object.assign({convite:'Não enviado'},g);});
  if(!DB.essenciais||Array.isArray(DB.essenciais)) DB.essenciais=d.essenciais;
  if(migrated.changed){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){ canStore=false; } }
})();

function allEss(){ var a=[]; ['kit','semana','levar','gorjetas'].forEach(function(g){ (DB.essenciais[g]||[]).forEach(function(x){a.push(x);}); }); return a; }
function countTasks(){ var t=0,dn=0; DB.cronograma.forEach(function(f){ f.tarefas.forEach(function(x){t++;if(x.done)dn++;}); }); allEss().forEach(function(x){t++;if(x.done)dn++;}); return {t:t,dn:dn}; }
function confirmados(){ var n=0; DB.convidados.forEach(function(g){ if(g.conf==='Confirmado') n+=(pn(g.ad)+pn(g.cr))||1; }); return n; }
function days(){ return Math.max(0,Math.ceil((new Date(2027,4,15)-new Date())/86400000)); }
function initials(){ var a=(DB.noiva||'').trim(), b=(DB.noivo||'').trim(); var x=a?a[0].toUpperCase():'', y=b?b[0].toUpperCase():''; return (x&&y)?(x+'&'+y):(x||y||'♡'); }
function coupleName(){ return (DB.noiva||DB.noivo)?((DB.noiva||'Noiva')+' & '+(DB.noivo||'Noivo')):'Nosso Casamento'; }

  setTxt('heroMono',initials()); setTxt('heroNames',coupleName());

function makeSyncService(db,ref,onValue,set){
  var root=ref(db,'casamento/shared'), busy=false;
  function outbox(){ try{return JSON.parse(localStorage.getItem(OUTBOX_KEY)||'[]');}catch(e){return [];} }
  function store(items){ try{localStorage.setItem(OUTBOX_KEY,JSON.stringify(items));}catch(e){canStore=false;} }
  async function flush(){ if(busy)return; var items=outbox(); if(!items.length)return; busy=true; try{ await set(root,items[items.length-1]); store([]); setSyncMessage('Sincronizado'); }catch(error){ setSyncMessage('Offline — alterações pendentes'); }finally{busy=false;} }
  onValue(root,function(snapshot){ if(snapshot.exists()&&!outbox().length){ var migrated=migrateDB(snapshot.val()); DB=migrated.data; try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){} showTab('inicio'); } });
  window.addEventListener('online',flush);
  return {queueSnapshot:function(snapshot){ var items=outbox(); items.push(snapshot); store(items.slice(-20)); flush(); },flush:flush};
}

    startApp(); syncService.flush();
  }catch(error){ setLoginMessage('Não foi possível entrar. Confira o nome escolhido e a senha.'); }
}
