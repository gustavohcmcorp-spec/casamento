<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#54634a">
<title>Plano de Casamento · Goiânia</title>
<style>
  :root{

  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

  .tabs button.on{background:var(--sage);color:#fff;border-color:var(--sage);box-shadow:0 2px 8px rgba(111,128,100,.35)}
  .page-actions{max-width:840px;margin:10px auto 0;padding:0 12px;display:flex;justify-content:flex-end}
  .page-actions.wide{max-width:1720px}
  .print-only,.guest-cards{display:none}
  .tab{display:none;padding-top:14px}
  .tab.active{display:block}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 2px 8px rgba(65,54,35,.06);padding:17px;margin-bottom:18px}

  .hero{position:relative;background:radial-gradient(120% 130% at 50% 0,#7c8d70 0,#54634a 70%);color:#fff;border-radius:20px;padding:26px 18px 22px;text-align:center;overflow:hidden;box-shadow:var(--sh);margin-bottom:14px}
  .hero:before,.hero:after{content:"";position:absolute;width:150px;height:150px;border:1px solid rgba(231,210,154,.35);border-radius:50%}
  .hero:before{top:-70px;left:-50px}.hero:after{bottom:-80px;right:-55px}
  .mono{width:60px;height:60px;margin:0 auto 8px;border:2px solid var(--gold-l);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:1.15rem;letter-spacing:1px;color:var(--gold-l);position:relative;z-index:1}
  .hero .names{font-family:Georgia,serif;font-size:1.9rem;line-height:1.15;position:relative;z-index:1}
  .hero .div{display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0;color:var(--gold-l);position:relative;z-index:1}

  .hero .place{font-size:.82rem;opacity:.82;margin-top:2px;position:relative;z-index:1}
  .hero .cd{margin-top:14px;position:relative;z-index:1}
  .hero .cd b{font-family:Georgia,serif;font-size:2.1rem;color:#fff;display:block;line-height:1}
  .hero .cd span{font-size:.72rem;text-transform:uppercase;letter-spacing:2px;opacity:.85}
  .pref{background:linear-gradient(90deg,#fbf4df,#fdfbf4);border-left:4px solid var(--gold);border-radius:10px;padding:10px 12px;font-size:.86rem;margin:8px 0}

  textarea.f{min-height:54px;resize:vertical}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  @media(max-width:560px){.grid3{grid-template-columns:1fr 1fr}}

  .btn.p{background:var(--sage);color:#fff}.btn.s{background:#fff;color:var(--sage-d);border:1px solid #c7bfb2}
  .btn.gold{background:var(--gold);color:#fff}

  .btn.del{background:#fbe9e3;color:#a24b34}
  .addrow{margin-top:9px}

  .guest-table .guest-people{min-width:0}.guest-table .guest-people details{min-width:0}.guest-table .guest-people .field{min-width:0}

  .acc-h .chev.up{transform:rotate(90deg)}
  .acc-b{display:none;padding-top:10px;border-top:1px solid var(--soft);margin-top:8px}
  .acc-b.open{display:block}
  .chip{font-size:.66rem;padding:3px 9px;border-radius:20px;font-weight:700;white-space:nowrap}
  .chip.g{background:#e6efe0;color:var(--sage-d)}.chip.y{background:#f7ecd2;color:#8a6d1e}.chip.n{background:#efe9de;color:#96917f}
  .opt{border:1px solid var(--line);border-left:4px solid var(--gold-l);border-radius:10px;padding:13px;margin:14px 0;background:var(--cream)}
  details.opt>summary{cursor:pointer;list-style:none;display:flex;gap:8px;align-items:center;min-height:34px;color:var(--sage-d);font-weight:700}
  details.opt>summary::-webkit-details-marker{display:none}
  details.opt>summary:after{content:'▸';margin-left:auto;color:var(--muted)}
  details.opt[open]>summary:after{transform:rotate(90deg)}
  .proposal-body{padding-top:10px;border-top:1px solid var(--line);margin-top:8px}
  .opt .oh{font-size:.76rem;font-weight:700;color:var(--sage-d);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
  .mini{font-size:.78rem;color:var(--muted)}
  .inc{display:grid;grid-template-columns:1fr auto;gap:6px 8px;align-items:center;border-bottom:1px solid var(--soft);padding:7px 0}
  .inc:last-child{border-bottom:none}
  .inc .lbl{font-size:.88rem}
  .inc select{border:1px solid var(--line);border-radius:8px;padding:6px;font-size:.8rem;background:#fbf7f0}
  .inc .obs{grid-column:1/-1}
  .ck{display:flex;align-items:flex-start;gap:11px;padding:12px 4px;border-bottom:1px solid var(--soft)}

  .ck .cx{flex:1}.ck .ct{font-size:.9rem}
  .ck.done .ct{text-decoration:line-through;color:var(--muted)}
  .ck .cn{width:100%;border:none;border-bottom:1px dashed var(--line);font-size:.78rem;padding:3px 0;background:transparent;margin-top:4px;color:var(--muted);font-family:inherit}
  .ptag{display:inline-block;font-size:.64rem;background:var(--soft);color:var(--sage-d);border-radius:6px;padding:1px 7px;margin-top:3px}
  .phase{font-family:Georgia,serif;font-size:1.02rem;color:var(--sage-d);margin:2px 0 4px}
  .twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -5px}
  table{border-collapse:collapse;width:100%;min-width:560px;font-size:.85rem}
  th,td{border:1px solid var(--line);padding:5px 6px;text-align:left;vertical-align:middle}
  th{background:var(--soft);font-size:.68rem;text-transform:uppercase;letter-spacing:.3px;color:var(--sage-d)}
  td input,td select{border:1px solid transparent;border-radius:6px;padding:7px 6px;font-size:.85rem;width:100%;background:transparent;font-family:inherit;min-width:72px}
  td input:focus,td select:focus{border-color:var(--sage);outline:none;background:#fff}
  td.num input{text-align:right}
  tfoot td{background:#f2ede1;font-weight:700}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--sage-d);color:#fff;padding:7px 16px;border-radius:20px;font-size:.8rem;opacity:0;transition:opacity .3s;z-index:60;pointer-events:none}

  .overlay{position:fixed;inset:0;background:rgba(45,38,25,.55);display:none;align-items:center;justify-content:center;padding:14px;z-index:80}
  .overlay.show{display:flex}
  .login{position:fixed;inset:0;z-index:100;background:linear-gradient(145deg,#f6f1e8,#e8dfcd);display:flex;align-items:center;justify-content:center;padding:18px}
.login[hidden]{display:none}.login .modal{max-width:420px;text-align:center}.login .who{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}.login .who .btn{min-height:48px}.login .who .btn.sel{outline:3px solid var(--gold-l);background:var(--sage-d);color:#fff}
  .sync{font-size:.72rem;color:var(--gold-l);margin-left:8px}
  .modal{background:#fff;border-radius:18px;max-width:540px;width:100%;max-height:86vh;overflow:auto;padding:18px}
  .modal h2{color:var(--sage-d);font-size:1.15rem;margin-bottom:6px}
  .modal textarea{width:100%;height:150px;font-family:monospace;font-size:.72rem;border:1px solid var(--line);border-radius:10px;padding:9px;margin-top:8px}
  @media(max-width:620px){
    .btn{min-height:42px}.btn.mini{min-height:42px;padding:8px 11px;font-size:.78rem}
    .tabs button{min-height:40px;padding:8px 15px}
    .guest-table{display:none}.guest-cards{display:block}
    .guest-card{border:1px solid var(--line);border-radius:12px;background:var(--cream);margin:10px 0;padding:0 12px}
    .guest-card>summary{cursor:pointer;list-style:none;padding:12px 0;display:grid;grid-template-columns:1fr auto;gap:3px 10px;color:var(--sage-d);font-weight:700}
  .guest-card>summary::-webkit-details-marker{display:none}.guest-card>summary:after{content:'▸';grid-column:2;grid-row:1/3;align-self:center}.guest-card[open]>summary:after{transform:rotate(90deg)}
    .guest-card-body{border-top:1px solid var(--line);padding:12px 0}.guest-card-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
    .guest-counts{grid-template-columns:1fr 1fr}.guest-counts .field:last-child{grid-column:1/-1}
  }
  @page{size:A4 portrait;margin:10mm}
  @media print{
    .top,.tabs,.page-actions,.addrow,.btn,.toast,.overlay,.screen-only,.guest-cards{display:none!important}
    body{font-size:10pt;background:#fff;color:#111}.wrap{max-width:none;padding:0}.tab{display:none!important;padding:0}.tab.active{display:block!important}
    .print-only{display:block!important}.card{box-shadow:none;border:none;padding:0;margin:0}.hero{box-shadow:none;background:#54634a!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .guest-print table{min-width:0;table-layout:fixed;font-size:9pt}.guest-print th,.guest-print td{padding:5px;border:1px solid #777}.guest-print th:nth-child(1){width:28%}.guest-print th:nth-child(2),.guest-print th:nth-child(3),.guest-print th:nth-child(4){width:8%}.guest-print th:nth-child(5){width:48%}
    .guest-print tr{break-inside:avoid}.guest-print h1{font-size:18pt;margin:0 0 3mm}.guest-print .print-meta{margin-bottom:5mm}
  }
</style>
</head>
<body>
<div class="login" id="login" aria-live="polite">
  <div class="modal">
    <div class="mono">G&G</div>
    <h1>Acesso privado</h1>
    <p class="hint">Planejamento do casamento — somente pessoas convidadas.</p>
    <div class="who" role="group" aria-label="Quem está acessando">
      <button class="btn s" type="button" data-profile="gustavo">Entrar como Gustavo</button>
      <button class="btn s" type="button" data-profile="gleicianne">Entrar como Gleicianne</button>
      <button class="btn s" type="button" data-profile="nanny">Entrar como Nanny</button>
    </div>
    <label class="fl" for="login-password">Senha</label>
    <input class="f" id="login-password" type="password" autocomplete="current-password" aria-label="Senha">
    <p class="hint" id="login-message">Escolha seu nome e informe sua senha.</p>
    <button class="btn p" id="login-submit" type="button">Entrar no painel</button>
  </div>
</div>
<div class="top" id="top" aria-live="polite"></div>
<div class="tabs" id="tabs"></div>
<div class="page-actions"><button class="btn s" id="print-current" type="button">🖨 Imprimir página</button></div>
<div class="wrap">
  <section class="tab" data-tab="inicio"></section>
  <section class="tab" data-tab="cronograma"></section>
  <section class="tab" data-tab="fornecedores"></section>
  <section class="tab" data-tab="equipe"></section>
  <section class="tab" data-tab="diad"></section>
  <section class="tab" data-tab="essenciais"></section>
  <section class="tab" data-tab="pagamentos"></section>
  <section class="tab" data-tab="convidados"></section>

</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="ov"><div class="modal" id="modal"></div></div>

<script>
"use strict";
function h(tag,attrs){
  var e=document.createElement(tag),i,k;
  if(attrs) for(k in attrs){
    if(k==='class') e.className=attrs[k];
    else if(k==='html') e.innerHTML=attrs[k];
    else if(k.slice(0,2)==='on'&&typeof attrs[k]==='function') e[k]=attrs[k];
    else if(attrs[k]!=null) e.setAttribute(k,attrs[k]);
  }
  for(i=2;i<arguments.length;i++){ var kid=arguments[i]; if(kid==null)continue;
    if(Array.isArray(kid)) kid.forEach(function(x){ if(x!=null) e.appendChild(x.nodeType?x:document.createTextNode(x)); });
    else e.appendChild(kid.nodeType?kid:document.createTextNode(kid)); }
  return e;
}
function pn(v){ if(v==null)return 0; v=(''+v).replace(/[^0-9,.-]/g,'').replace(/\./g,'').replace(',','.'); var n=parseFloat(v); return isNaN(n)?0:n; }
function fmt(n){ return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0}); }
function formatMoney(v){ return pn(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:2,maximumFractionDigits:2}); }
function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.className='toast show'; clearTimeout(toast._t); toast._t=setTimeout(function(){t.className='toast';},1400); }

var KEY='casamento_2027_goiania_v2', OUTBOX_KEY='casamento_2027_outbox_v1', DB, saveT, canStore=true, syncService=null;
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){ canStore=false; } if(syncService)syncService.queueSnapshot(DB); updateHeader(); }
function saveD(){ clearTimeout(saveT); saveT=setTimeout(save,350); }
function load(){ try{ var s=localStorage.getItem(KEY); if(s)return JSON.parse(s); }catch(e){ canStore=false; } return null; }

function tf(o,k,ph,type,afterInput,saveImmediately){ var e=h('input',{class:'f',type:type||'text',placeholder:ph||'',oninput:function(){o[k]=e.value;if(saveImmediately)save();else saveD();if(afterInput)afterInput();}}); e.value=o[k]==null?'':o[k]; return e; }
function moneyInput(o,k,ph,afterInput){ var e=h('input',{class:'f',type:'text',inputmode:'decimal',placeholder:ph||'',oninput:function(){o[k]=e.value;saveD();if(afterInput)afterInput();},onblur:function(){ if(e.value!==''){ e.value=formatMoney(e.value); o[k]=e.value; save(); if(afterInput)afterInput(); } }}); e.value=o[k]?formatMoney(o[k]):''; return e; }
function ensurePayment(p){ var payment=Object.assign({tipoCobranca:'fechado',valorUnitario:'',entradaTipo:'valor',entradaValor:'',entradaStatus:'Pendente',entradaDataPagamento:'',parcelasQtd:'',primeiroVencimento:'',parcelasDetalhes:[],pixDescontoPercentual:'',modalidadeEscolhida:'parcelado',formaPagamento:'',condicaoPagamento:'',avistaPago:null},p||{}); if(!payment.id)payment.id=makeId('pag'); if(!payment.formaPagamento)payment.formaPagamento=payment.modalidadeEscolhida==='pix'?'pix':'a definir'; if(!payment.condicaoPagamento)payment.condicaoPagamento=(payment.modalidadeEscolhida==='parcelado'||(payment.parcelasDetalhes||[]).length||payment.parcelasQtd)?'parcelado':'avista'; if(payment.avistaPago==null&&payment.pixPago!=null)payment.avistaPago=payment.pixPago; return payment; }
function guestPlanningBase(){ var listed=(DB.convidados||[]).reduce(function(sum,guest){return sum+guestCounts(guest).total;},0); return Math.max(pn(DB.convidadosPrevistos),listed); }
function supplierTotal(o){ return o&&o.tipoCobranca==='porPessoa'?pn(o.valorUnitario)*guestPlanningBase():pn(o&&o.valor); }
function supplierEstimateText(o){ return 'Total estimado: '+formatMoney(supplierTotal(o))+' · Base: '+guestPlanningBase()+' convidados (maior entre previstos e lista da aba Convidados). Alterações nessa quantidade atualizam o cálculo.'; }
function paymentTotal(p){ p=ensurePayment(p); return p.tipoCobranca==='porPessoa'?pn(p.valorUnitario)*guestPlanningBase():pn(p.total); }
function paymentEntry(p){ var total=paymentTotal(p); return p.entradaTipo==='percentual'?total*pn(p.entradaValor)/100:pn(p.entradaValor||p.entrada); }
function paymentPix(p){ return paymentTotal(p)*(1-pn(p.pixDescontoPercentual)/100); }
function paymentEntryPaid(p){ return p.entradaStatus==='Pago'?paymentEntry(p):0; }
function paymentPaid(p){ p=ensurePayment(p); if(p.condicaoPagamento==='avista')return p.avistaPago?paymentCommitted(p):0; if((p.parcelasDetalhes||[]).length)return p.parcelasDetalhes.filter(function(x){return x.status==='Pago';}).reduce(function(a,x){return a+pn(x.valor);},0)+paymentEntryPaid(p); return p.pago!==undefined&&p.pago!==''?pn(p.pago):paymentEntryPaid(p); }
function paymentCommitted(p){ p=ensurePayment(p); return p.condicaoPagamento==='avista'&&p.formaPagamento==='pix'?paymentPix(p):paymentTotal(p); }
function paymentBalance(p){ return Math.max(0,paymentCommitted(p)-paymentPaid(p)); }
function nextPendingPayment(){
  var next=null;
  (DB.pagamentos||[]).forEach(function(payment){
    (payment.parcelasDetalhes||[]).forEach(function(parcel){
      var date=parcel.vencimento?new Date(parcel.vencimento+'T12:00:00'):null;
      if(parcel.status!=='Pendente'||!date||isNaN(date.getTime()))return;
      if(!next||date.getTime()<next.date.getTime())next={forn:payment.forn||'Fornecedor',numero:parcel.numero||1,vencimento:parcel.vencimento,valor:parcel.valor,date:date};
    });
  });
  return next;
}
function nextPaymentCard(testId){
  var next=nextPendingPayment(); if(!next)return null;
  return h('div',{class:'card','data-testid':testId||null},h('h2',{},'⏰ Próximo vencimento'),h('p',{class:'hint'},next.forn+' · parcela '+next.numero+' · '+next.date.toLocaleDateString('pt-BR')+' · '+formatMoney(next.valor)));

function makeSyncService(db,ref,onValue,set){
  var root=ref(db,'casamento/shared'), busy=false;
  function outbox(){ try{return JSON.parse(localStorage.getItem(OUTBOX_KEY)||'[]');}catch(e){return [];} }
  function store(items){ try{localStorage.setItem(OUTBOX_KEY,JSON.stringify(items));}catch(e){canStore=false;} }
  async function flush(){
    if(busy)return;
    busy=true;
    try{
      while(true){
        var items=outbox();
        if(!items.length)break;
        var snapshot=items[items.length-1],sent=JSON.stringify(snapshot);
        await set(root,snapshot);
        var after=outbox(),latest=after[after.length-1];
        store(latest&&JSON.stringify(latest)!==sent?[latest]:[]);
      }
      setSyncMessage('Sincronizado');
    }catch(error){ setSyncMessage('Offline — alterações pendentes'); }
    finally{busy=false;}
  }
  onValue(root,function(snapshot){ if(snapshot.exists()&&!outbox().length){ var migrated=migrateDB(snapshot.val()); DB=migrated.data; try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){} showTab('inicio'); if(migrated.changed)set(root,DB).catch(function(){setSyncMessage('Offline — migração pendente');}); } });
  window.addEventListener('online',flush);
  return {queueSnapshot:function(snapshot){ var items=outbox(); items.push(snapshot); store(items.slice(-20)); flush(); },flush:flush};
}
